services:
  db:
    image: postgres:16-alpine
    container_name: prosper-db
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - prosper-net

  api:
    build: ./api
    container_name: prosper-api
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - prosper-net

  frontend:
    build: ./frontend
    container_name: prosper-frontend
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - prosper-net

  bot:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: prosper-bot
    env_file: .env
    ports:
      - "7860:7860"
      - "7861:7861"
    networks:
      - prosper-net

volumes:
  pgdata:

networks:
  prosper-net:
    driver: bridge


